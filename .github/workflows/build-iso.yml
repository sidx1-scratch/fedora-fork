name: Build Custom Fedora ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Live ISO using Fedora Container
        run: |
          # Run the official Fedora container with appropriate privileges
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/workspace \
            registry.fedoraproject.org/fedora:40 \
            /bin/bash -c "
              dnf install -y lorax rpm pykickstart anaconda-tui &&
              livemedia-creator --ks /workspace/custom-fedora.ks \
                                --make-iso \
                                --no-virt \
                                --iso-name 'custom-fedora-dev-remix.iso' \
                                --location 'https://fedoraproject.org' \
                                --resultdir /workspace/output \
                                --logfile /workspace/livemedia-creator.log
            "

      - name: Upload Bootable Operating System
        uses: actions/upload-artifact@v4
        with:
          name: fedora-dev-iso
          path: ./output/*.iso
          retention-days: 5
